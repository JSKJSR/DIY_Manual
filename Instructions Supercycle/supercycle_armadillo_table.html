<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Armadillo Supercycle Build Table</title>
  <style>
    :root {
      --bg: #f6f7f8;
      --panel: #ffffff;
      --ink: #1d2428;
      --muted: #617078;
      --line: #d9e0e4;
      --accent: #1d7f74;
      --accent-2: #b15b22;
      --blue: #245a8d;
      --danger: #b83232;
      --shadow: 0 12px 30px rgba(21, 32, 38, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.35;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(246, 247, 248, 0.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }
    .wrap { max-width: 1680px; margin: 0 auto; padding: 18px 24px; }
    .titlebar { display: flex; align-items: start; justify-content: space-between; gap: 16px; }
    h1 { margin: 0; font-size: 24px; letter-spacing: 0; }
    .subtitle { margin: 4px 0 0; color: var(--muted); font-size: 14px; }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto auto auto auto auto auto;
      gap: 10px;
      margin-top: 14px;
      align-items: center;
    }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 6px;
      padding: 9px 10px;
      font: inherit;
    }
    textarea { min-height: 92px; resize: vertical; font-family: inherit; }
    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 6px;
      padding: 9px 12px;
      font: inherit;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover { border-color: #aab7bd; }
    .primary { background: var(--accent); color: white; border-color: var(--accent); }
    .danger { color: var(--danger); }
    .ghost { background: transparent; }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 18px;
      align-items: start;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      box-shadow: var(--shadow);
    }
    .stat strong { display: block; font-size: 22px; }
    .stat span { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    .table-shell {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: auto;
      box-shadow: var(--shadow);
    }
    table { width: 100%; border-collapse: collapse; min-width: 1180px; }
    th, td { vertical-align: top; text-align: left; border-bottom: 1px solid var(--line); padding: 12px; }
    th {
      position: sticky;
      top: 117px;
      z-index: 4;
      background: #eef3f4;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #425159;
    }
    tr.deleted { opacity: 0.46; background: #f5eeee; }
    .phase { font-weight: 700; color: var(--blue); min-width: 170px; }
    .step-title { min-width: 220px; }
    .step-title strong { display: block; margin-bottom: 4px; }
    .source { color: var(--muted); font-size: 12px; }
    ul { margin: 0; padding-left: 18px; }
    li { margin: 0 0 5px; }
    .empty { color: var(--muted); font-style: italic; }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-left: 5px;
      padding: 1px 6px;
      border-radius: 999px;
      border: 1px solid #b7d6d1;
      color: #0f5d55;
      background: #eef9f7;
      font-size: 11px;
      font-style: normal;
    }
    .chip.assembly { border-color: #e3c39d; background: #fff6e8; color: #855019; }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; min-width: 140px; }
    aside {
      position: sticky;
      top: 116px;
      display: grid;
      gap: 14px;
    }
    .side-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      box-shadow: var(--shadow);
    }
    .side-panel h2 { margin: 0 0 10px; font-size: 16px; }
    .summary-list, .catalog-list { max-height: 330px; overflow: auto; border-top: 1px solid var(--line); margin-top: 10px; padding-top: 8px; }
    .catalog-item { padding: 7px 0; border-bottom: 1px solid #eef1f2; }
    .catalog-item strong { display: block; font-size: 13px; }
    .catalog-item span { display: block; color: var(--muted); font-size: 12px; }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(11, 18, 22, 0.42);
    }
    .modal-backdrop.open { display: grid; }
    .modal {
      width: min(980px, 100%);
      max-height: min(900px, 92vh);
      overflow: auto;
      background: #fff;
      border-radius: 8px;
      border: 1px solid var(--line);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.22);
    }
    .modal header {
      position: sticky;
      top: 0;
      background: #fff;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }
    .modal h2 { margin: 0; font-size: 18px; }
    .modal-body { padding: 16px; display: grid; gap: 12px; }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    label { display: grid; gap: 5px; color: var(--muted); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
    label input, label textarea { color: var(--ink); font-size: 14px; font-weight: 400; text-transform: none; letter-spacing: 0; }
    .modal-footer { padding: 16px; display: flex; justify-content: flex-end; gap: 10px; border-top: 1px solid var(--line); }
    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
      aside { position: static; }
      .toolbar { grid-template-columns: 1fr 1fr; }
      th { top: 169px; }
    }
    @media (max-width: 720px) {
      .wrap { padding: 14px; }
      .titlebar { display: block; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .toolbar { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="titlebar">
        <div>
          <h1 id="appTitle">Armadillo Supercycle Build Table</h1>
          <p class="subtitle" id="appSubtitle">PDF instructions converted into editable steps, enriched with BOM references from BOM.xlsx.</p>
        </div>
      </div>
      <div class="toolbar">
        <input id="search" type="search" placeholder="Search steps, parts, screws...">
        <button id="langToggle" class="primary">FR</button>
        <button id="addStep">Add step</button>
        <button id="openDiagrams">Diagrams</button>
        <button id="showDeleted">Show deleted</button>
        <button id="exportJson">Export JSON</button>
        <button id="exportPortable">Portable save</button>
        <button id="resetData" class="danger">Reset</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div class="stats" id="stats"></div>
    <div class="layout">
      <section class="table-shell">
        <table>
          <thead>
            <tr>
              <th data-i18n="phase">Phase</th>
              <th data-i18n="step">Step</th>
              <th data-i18n="components">Components</th>
              <th data-i18n="hardware">Screws / fasteners</th>
              <th data-i18n="consumables">Tools / consumables</th>
              <th data-i18n="instructions">Instructions</th>
              <th data-i18n="actions">Actions</th>
            </tr>
          </thead>
          <tbody id="stepsBody"></tbody>
        </table>
      </section>

      <aside>
        <section class="side-panel">
          <h2 id="summaryTitle">Active build summary</h2>
          <div id="summary" class="summary-list"></div>
        </section>
        <section class="side-panel">
          <h2 id="catalogTitle">BOM catalog</h2>
          <input id="catalogSearch" type="search" placeholder="Search BOM code or name...">
          <div id="catalog" class="catalog-list"></div>
        </section>
      </aside>
    </div>
  </main>

  <div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true">
    <section class="modal">
      <header><h2 id="modalTitle">Edit step</h2></header>
      <form id="stepForm">
        <div class="modal-body">
          <div class="form-grid">
            <label>Phase EN<input name="phaseEn"></label>
            <label>Phase FR<input name="phaseFr"></label>
            <label>Step label<input name="step"></label>
            <label>Source<input name="source"></label>
            <label>Title EN<input name="titleEn"></label>
            <label>Title FR<input name="titleFr"></label>
          </div>
          <label>Components<textarea name="components"></textarea></label>
          <label>Screws / fasteners<textarea name="hardware"></textarea></label>
          <label>Tools / consumables<textarea name="consumables"></textarea></label>
          <label>Instructions<textarea name="instructions"></textarea></label>
        </div>
        <div class="modal-footer">
          <button type="button" id="cancelModal">Cancel</button>
          <button type="submit" class="primary">Save</button>
        </div>
      </form>
    </section>
  </div>

  <script src="armadillo_portable_state.js"></script>

    const frTerms = [
      ["socket head cap bolt", "vis CHC"],

    const catalogByCode = new Map();
    BOM_CATALOG.forEach(item => {
      if (item.code && !catalogByCode.has(item.code.toUpperCase())) catalogByCode.set(item.code.toUpperCase(), item);
    });

    let state = loadState();
    let showDeleted = false;
    let editingId = null;

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch (error) {}
      if (window.ARMADILLO_PORTABLE_STATE?.tableSteps) {
        return { lang: "en", steps: structuredClone(window.ARMADILLO_PORTABLE_STATE.tableSteps) };
      }
      return { lang: "en", steps: structuredClone(INITIAL_STEPS) };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function txt(key) {
      return ui[state.lang][key] || ui.en[key] || key;
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[ch]));
    }

    function translateLine(text) {
      if (state.lang !== "fr") return text;
      let out = text;
      for (const [en, fr] of frTerms) {
        out = out.replace(new RegExp(`\\b${escapeRegex(en)}\\b`, "gi"), fr);
      }
      return out;
    }

    function escapeRegex(value) {
      return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function localStep(step) {
      return {
        phase: state.lang === "fr" ? (step.phaseFr || translateLine(step.phaseEn)) : step.phaseEn,
        title: state.lang === "fr" ? (step.titleFr || translateLine(step.titleEn)) : step.titleEn,
      };
    }

    function extractCodes(line) {
      const codes = new Set();
      const patterns = [
        /\(([A-Z]?\d{4}[A-Z-]*|C\d{4}|xxxx)\)/gi,
        /\[([A-Z]?\d{4}[A-Z-]*|C\d{4}|xxxx)\]/gi,
      ];
      patterns.forEach(pattern => {
        for (const match of line.matchAll(pattern)) codes.add(match[1].toUpperCase());
      });
      return [...codes];
    }

    function renderList(items) {
      if (!items || !items.length) return `<span class="empty">${txt("noItems")}</span>`;
      return `<ul>${items.map(item => `<li>${renderLine(item)}</li>`).join("")}</ul>`;
    }

    function renderLine(line) {
      const translated = escapeHtml(translateLine(line));
      const chips = extractCodes(line).map(code => {
        const item = catalogByCode.get(code);
        if (!item) return `<span class="chip" title="${txt("bomNone")}">${escapeHtml(code)}</span>`;
        const klass = item.source.includes("assembly") ? "chip assembly" : "chip";
        return `<span class="${klass}" title="${escapeHtml(item.name)}">${escapeHtml(code)}</span>`;
      }).join("");
      return `${translated}${chips}`;
    }

    function searchable(step) {
      const loc = localStep(step);
      return [
        loc.phase,
        step.step,
        loc.title,
        step.source,
        ...step.components,
        ...step.hardware,
        ...step.consumables,
        ...step.instructions,
      ].join(" ").toLowerCase();
    }

    function render() {
      renderChrome();
      renderStats();
      renderTable();
      renderSummary();
      renderCatalog();
      saveState();
    }

    function renderChrome() {
      document.documentElement.lang = state.lang;
      document.getElementById("appTitle").textContent = txt("appTitle");
      document.getElementById("appSubtitle").textContent = txt("appSubtitle");
      document.getElementById("search").placeholder = txt("search");
      document.getElementById("catalogSearch").placeholder = txt("catalogSearch");
      document.getElementById("langToggle").textContent = txt("langToggle");
      document.getElementById("addStep").textContent = txt("addStep");
      document.getElementById("openDiagrams").textContent = txt("openDiagrams");
      document.getElementById("showDeleted").textContent = showDeleted ? txt("hideDeleted") : txt("showDeleted");
      document.getElementById("exportJson").textContent = txt("exportJson");
      document.getElementById("exportPortable").textContent = txt("exportPortable");
      document.getElementById("resetData").textContent = txt("resetData");
      document.getElementById("summaryTitle").textContent = txt("activeSummary");
      document.getElementById("catalogTitle").textContent = txt("catalogTitle");
      document.querySelectorAll("[data-i18n]").forEach(el => el.textContent = txt(el.dataset.i18n));
      document.getElementById("cancelModal").textContent = txt("cancel");
      document.querySelector("#stepForm .primary").textContent = txt("save");
    }

    function renderStats() {
      const active = state.steps.filter(s => !s.deleted);
      const deleted = state.steps.length - active.length;
      const comp = active.reduce((sum, step) => sum + step.components.length, 0);
      const hard = active.reduce((sum, step) => sum + step.hardware.length, 0);
      document.getElementById("stats").innerHTML = [
        [active.length, txt("activeSteps")],
        [deleted, txt("deletedSteps")],
        [comp, txt("componentsCount")],
        [hard, txt("hardwareCount")],
      ].map(([value, label]) => `<div class="stat"><strong>${value}</strong><span>${label}</span></div>`).join("");
    }

    function renderTable() {
      const query = document.getElementById("search").value.trim().toLowerCase();
      const rows = state.steps.filter(step => {
        if (!showDeleted && step.deleted) return false;
        if (!query) return true;
        return searchable(step).includes(query);
      });
      const body = document.getElementById("stepsBody");
      if (!rows.length) {
        body.innerHTML = `<tr><td colspan="7" class="empty">${txt("noResults")}</td></tr>`;
        return;
      }
      body.innerHTML = rows.map(step => {
        const loc = localStep(step);
        const action = step.deleted
          ? `<button data-action="restore" data-id="${step.id}">${txt("restore")}</button>`
          : `<button data-action="remove" data-id="${step.id}" class="danger">${txt("remove")}</button>`;
        return `<tr class="${step.deleted ? "deleted" : ""}">
          <td class="phase">${escapeHtml(loc.phase)}</td>
          <td class="step-title"><strong>${escapeHtml(step.step)} - ${escapeHtml(loc.title)}</strong><span class="source">${txt("source")}: ${escapeHtml(step.source)}</span></td>
          <td>${renderList(step.components)}</td>
          <td>${renderList(step.hardware)}</td>
          <td>${renderList(step.consumables)}</td>
          <td>${renderList(step.instructions)}</td>
          <td><div class="actions"><button data-action="edit" data-id="${step.id}">${txt("edit")}</button>${action}</div></td>
        </tr>`;
      }).join("");
    }

    function renderSummary() {
      const active = state.steps.filter(s => !s.deleted);
      const counts = new Map();
      active.flatMap(s => [...s.components, ...s.hardware]).forEach(line => {
        const normalized = line.replace(/\s+/g, " ").trim();
        counts.set(normalized, (counts.get(normalized) || 0) + 1);
      });
      const top = [...counts.entries()].sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0])).slice(0, 80);
      document.getElementById("summary").innerHTML = top.length
        ? `<ul>${top.map(([line, count]) => `<li>${renderLine(line)}${count > 1 ? ` <span class="chip">x${count} lines</span>` : ""}</li>`).join("")}</ul>`
        : `<span class="empty">${txt("noItems")}</span>`;
    }

    function renderCatalog() {
      const query = document.getElementById("catalogSearch").value.trim().toLowerCase();
      const list = BOM_CATALOG.filter(item => {
        if (!query) return true;
        return `${item.code} ${item.name} ${item.ref} ${item.vendor} ${item.source}`.toLowerCase().includes(query);
      }).slice(0, 120);
      document.getElementById("catalog").innerHTML = list.map(item => `
        <div class="catalog-item">
          <strong>${escapeHtml(item.code || "—")} · ${escapeHtml(item.name || "—")}</strong>
          <span>${escapeHtml(item.source)}${item.ref ? ` · ${escapeHtml(item.ref)}` : ""}${item.vendor ? ` · ${escapeHtml(item.vendor)}` : ""}</span>
        </div>`).join("");
    }

    function openModal(step) {
      editingId = step ? step.id : null;
      document.getElementById("modalTitle").textContent = step ? txt("modalEdit") : txt("modalAdd");
      const form = document.getElementById("stepForm");
      const data = step || {
        phaseEn: "",
        phaseFr: "",
        step: "",
        source: "Manual",
        titleEn: "",
        titleFr: "",
        components: [],
        hardware: [],
        consumables: [],
        instructions: [],
      };
      for (const name of ["phaseEn", "phaseFr", "step", "source", "titleEn", "titleFr"]) form.elements[name].value = data[name] || "";
      for (const name of ["components", "hardware", "consumables", "instructions"]) form.elements[name].value = (data[name] || []).join("\n");
      document.getElementById("modalBackdrop").classList.add("open");
    }

    function closeModal() {
      document.getElementById("modalBackdrop").classList.remove("open");
      editingId = null;
    }

    function lines(value) {
      return value.split(/\n+/).map(v => v.trim()).filter(Boolean);
    }

    document.getElementById("langToggle").addEventListener("click", () => {
      state.lang = state.lang === "en" ? "fr" : "en";
      render();
    });
    document.getElementById("search").addEventListener("input", renderTable);
    document.getElementById("catalogSearch").addEventListener("input", renderCatalog);
    document.getElementById("showDeleted").addEventListener("click", () => {
      showDeleted = !showDeleted;
      render();
    });
    document.getElementById("addStep").addEventListener("click", () => openModal(null));
    document.getElementById("openDiagrams").addEventListener("click", () => {
      window.location.href = "diagram_pages/index.html";
    });
    document.getElementById("resetData").addEventListener("click", () => {
      if (!confirm(txt("resetConfirm"))) return;
      localStorage.removeItem(STORAGE_KEY);
      state = { lang: state.lang, steps: structuredClone(INITIAL_STEPS) };
      render();
    });
    document.getElementById("exportJson").addEventListener("click", async () => {
      const json = JSON.stringify(state.steps.filter(step => !step.deleted), null, 2);
      try {
        await navigator.clipboard.writeText(json);
        alert(txt("copied"));
      } catch (error) {
        const blob = new Blob([json], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "armadillo-supercycle-steps.json";
        link.click();
        URL.revokeObjectURL(url);
      }
    });
    document.getElementById("exportPortable").addEventListener("click", () => {
      const diagrams = {};
      for (let index = 0; index < localStorage.length; index += 1) {
        const key = localStorage.key(index);
        if (!key || !key.startsWith("armadillo-diagram-hidden-")) continue;
        try {
          diagrams[key.replace("armadillo-diagram-hidden-", "")] = JSON.parse(localStorage.getItem(key) || "[]");
        } catch (error) {}
      }
      const portable = {
        tableSteps: state.steps,
        diagrams,
        exportedAt: new Date().toISOString(),
      };
      const js = `window.ARMADILLO_PORTABLE_STATE = ${JSON.stringify(portable, null, 2)};\n`;
      const blob = new Blob([js], { type: "text/javascript" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "armadillo_portable_state.js";
      link.click();
      URL.revokeObjectURL(url);
      alert(txt("portableSaved"));
    });
    document.getElementById("stepsBody").addEventListener("click", event => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const step = state.steps.find(item => item.id === button.dataset.id);
      if (!step) return;
      if (button.dataset.action === "edit") openModal(step);
      if (button.dataset.action === "remove") {
        step.deleted = true;
        render();
      }
      if (button.dataset.action === "restore") {
        step.deleted = false;
        render();
      }
    });
    document.getElementById("cancelModal").addEventListener("click", closeModal);
    document.getElementById("modalBackdrop").addEventListener("click", event => {
      if (event.target.id === "modalBackdrop") closeModal();
    });
    document.getElementById("stepForm").addEventListener("submit", event => {
      event.preventDefault();
      const form = event.currentTarget;
      const payload = {
        id: editingId || `manual-${Date.now()}`,
        phaseEn: form.elements.phaseEn.value.trim(),
        phaseFr: form.elements.phaseFr.value.trim(),
        step: form.elements.step.value.trim() || "Step",
        titleEn: form.elements.titleEn.value.trim(),
        titleFr: form.elements.titleFr.value.trim(),
        source: form.elements.source.value.trim() || "Manual",
        components: lines(form.elements.components.value),
        hardware: lines(form.elements.hardware.value),
        consumables: lines(form.elements.consumables.value),
        instructions: lines(form.elements.instructions.value),
      };
      if (editingId) {
        const index = state.steps.findIndex(step => step.id === editingId);
        state.steps[index] = { ...state.steps[index], ...payload };
      } else {
        state.steps.push(payload);
      }
      closeModal();
      render();
    });

    render();
  </script>
